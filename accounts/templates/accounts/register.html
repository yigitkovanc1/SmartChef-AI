<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartChef - Kayıt Ol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 2.5rem;
        }
        .brand-text {
            color: #ff6b6b;
            font-weight: 800;
        }
        .btn-custom {
            background-color: #ff6b6b;
            color: white;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-custom:hover {
            background-color: #fa5252;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <h2 class="brand-text mb-2">👨‍🍳 Mutfağa Katıl</h2>
        <p class="text-muted mb-4">SmartChef AI ile yeni nesil tariflere başla</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger" role="alert" style="border-radius: 10px;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="kullanici_adi" name="kullanici_adi" placeholder="Kullanıcı Adı" required style="border-radius: 10px;">
                <label for="kullanici_adi">👤 Kullanıcı Adı</label>
            </div>

            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" name="email" placeholder="E-posta" required style="border-radius: 10px;">
                <label for="email">📧 E-posta Adresi</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="sifre" name="sifre" placeholder="Şifre" required style="border-radius: 10px;">
                <label for="sifre">🔒 Şifre</label>
            </div>

            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="sifre_tekrar" name="sifre_tekrar" placeholder="Şifre Tekrar" required style="border-radius: 10px;">
                <label for="sifre_tekrar">🔒 Şifreyi Tekrar Girin</label>
            </div>

            <button class="btn btn-custom w-100 py-3" type="submit">Aramıza Katıl</button>
        </form>

        <div class="mt-4">
            <p class="text-muted" style="font-size: 0.9rem;">
                Zaten şef önlüğün var mı? <br>
                <a href="{% url 'giris_yap' %}" class="brand-text text-decoration-none">Giriş Ekranına Dön</a>
            </p>
        </div>
    </div>

</body>
</html>
