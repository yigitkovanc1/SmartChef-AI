<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SmartChef - Şifremi Unuttum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .reset-card { width: 100%; max-width: 400px; background-color: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 2.5rem; }
        .brand-text { color: #ff6b6b; font-weight: 800; }
        .btn-custom { background-color: #ff6b6b; color: white; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .btn-custom:hover { background-color: #fa5252; color: white; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="reset-card text-center">
        <h2 class="brand-text mb-2">🔑 Şifremi Unuttum</h2>
        <p class="text-muted mb-4">Sisteme kayıtlı e-posta adresini gir, sana 6 haneli bir şef kodu gönderelim.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger" style="border-radius: 10px;">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-floating mb-4">
                <input type="email" class="form-control" id="email" name="email" placeholder="E-posta" required style="border-radius: 10px;">
                <label for="email">📧 E-posta Adresi</label>
            </div>
            <button class="btn btn-custom w-100 py-3" type="submit">Kodu Gönder</button>
        </form>
        <div class="mt-4"><a href="{% url 'giris_yap' %}" class="brand-text text-decoration-none">Giriş Ekranına Dön</a></div>
    </div>
</body>
</html>
