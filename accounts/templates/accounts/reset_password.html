<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartChef - Şifreyi Yenile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .reset-card {
            width: 100%;
            max-width: 400px;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 2.5rem;
        }
        .brand-text { color: #ff6b6b; font-weight: 800; }
        .btn-custom { background-color: #ff6b6b; color: white; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .btn-custom:hover { background-color: #fa5252; color: white; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="reset-card text-center">
        <h2 class="brand-text mb-2">🔐 Şifreyi Sıfırla</h2>
        <p class="text-muted mb-4"><b>{{ email }}</b> adresine gönderilen 6 haneli kodu girin.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger" style="border-radius: 10px;">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="kod" name="kod" placeholder="6 Haneli Kod" maxlength="6" required style="border-radius: 10px; text-align: center; letter-spacing: 5px; font-weight: bold;">
                <label for="kod">📩 6 Haneli Kod</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="yeni_sifre" name="yeni_sifre" placeholder="Yeni Şifre" required style="border-radius: 10px;">
                <label for="yeni_sifre">🔒 Yeni Şifre</label>
            </div>

            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="yeni_sifre_tekrar" name="yeni_sifre_tekrar" placeholder="Yeni Şifre Tekrar" required style="border-radius: 10px;">
                <label for="yeni_sifre_tekrar">🔒 Yeni Şifreyi Tekrar Girin</label>
            </div>

            <button class="btn btn-custom w-100 py-3" type="submit">Şifreyi Değiştir</button>
        </form>
    </div>

</body>
</html>
